<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="RainfallMon">
  <meta name="theme-color" content="#319795">
  <meta name="description" content="Sistem Monitoring Curah Hujan - TNCF Temanggung">

  <title>Rainfall Monitoring System</title>

  <!-- PWA Manifest -->
  <link rel="manifest" href="./manifest.json">

  <!-- Apple Touch Icons -->
  <link rel="apple-touch-icon" href="./icons/icon-152.png">
  <link rel="apple-touch-icon" sizes="152x152" href="./icons/icon-152.png">
  <link rel="apple-touch-icon" sizes="192x192" href="./icons/icon-192.png">
  <link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="./icons/icon-512.png">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #319795;
      --primary-dark: #2C7A7B;
      --bg: #e2e8f0;
      --white: #ffffff;
      --text: #2d3748;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--bg);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    /* ===== SPLASH SCREEN ===== */
    #splash {
      position: fixed; inset: 0; z-index: 9999;
      background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 100%);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      transition: opacity 0.5s ease, visibility 0.5s ease;
    }
    #splash.hidden { opacity: 0; visibility: hidden; }

    .splash-icon {
      width: 90px; height: 90px;
      background: rgba(255,255,255,0.15);
      border-radius: 22px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 20px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
      animation: splashPop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }
    .splash-icon svg { width: 52px; height: 52px; }

    @keyframes splashPop {
      from { transform: scale(0.5); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }

    .splash-title {
      color: white; font-size: 1.4rem; font-weight: 700;
      letter-spacing: 0.02em; margin-bottom: 6px;
      animation: fadeUp 0.5s 0.3s ease both;
    }
    .splash-subtitle {
      color: rgba(255,255,255,0.7); font-size: 0.82rem;
      animation: fadeUp 0.5s 0.45s ease both;
    }
    .splash-loader {
      margin-top: 40px;
      width: 36px; height: 36px;
      border: 3px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite, fadeUp 0.5s 0.6s ease both;
    }
    @keyframes spin    { to { transform: rotate(360deg); } }
    @keyframes fadeUp  { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

    /* ===== IFRAME WRAPPER ===== */
    #app-frame {
      width: 100%; height: 100%;
      border: none; display: block;
    }

    /* ===== INSTALL BANNER ===== */
    #install-banner {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 1000;
      background: var(--white);
      border-top: 1px solid #e2e8f0;
      padding: 14px 20px;
      display: flex; align-items: center; gap: 14px;
      box-shadow: 0 -4px 20px rgba(0,0,0,0.08);
      transform: translateY(100%);
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    #install-banner.show { transform: translateY(0); }

    .install-icon {
      width: 44px; height: 44px; flex-shrink: 0;
      background: linear-gradient(135deg, var(--primary-dark), var(--primary));
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
    }
    .install-icon svg { width: 24px; height: 24px; }

    .install-text { flex: 1; }
    .install-text strong { display: block; font-size: 0.9rem; color: var(--text); }
    .install-text span { font-size: 0.75rem; color: #718096; }

    .install-btn {
      background: var(--primary); color: white;
      border: none; border-radius: 8px;
      padding: 8px 16px; font-size: 0.82rem; font-weight: 600;
      cursor: pointer; white-space: nowrap;
      transition: background 0.2s;
    }
    .install-btn:hover { background: var(--primary-dark); }

    .install-dismiss {
      background: none; border: none; cursor: pointer;
      color: #a0aec0; font-size: 1.1rem; line-height: 1;
      padding: 4px; flex-shrink: 0;
    }

    /* ===== iOS INSTALL HINT ===== */
    #ios-hint {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 1000;
      background: var(--white);
      border-top: 1px solid #e2e8f0;
      padding: 16px 20px 24px;
      box-shadow: 0 -4px 20px rgba(0,0,0,0.08);
      transform: translateY(100%);
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    #ios-hint.show { transform: translateY(0); }
    #ios-hint p { font-size: 0.85rem; color: var(--text); line-height: 1.6; }
    #ios-hint strong { color: var(--primary); }
    #ios-hint-close {
      position: absolute; top: 12px; right: 16px;
      background: none; border: none; cursor: pointer;
      color: #a0aec0; font-size: 1.2rem;
    }

    /* ===== OFFLINE NOTICE ===== */
    #offline-notice {
      position: fixed; top: 0; left: 0; right: 0; z-index: 800;
      background: #744210; color: #fefcbf;
      text-align: center; font-size: 0.78rem; font-weight: 600;
      padding: 6px 12px;
      transform: translateY(-100%);
      transition: transform 0.3s ease;
    }
    #offline-notice.show { transform: translateY(0); }
  </style>
</head>
<body>

<!-- Splash Screen -->
<div id="splash">
  <div class="splash-icon">
    <svg viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- Main raindrop -->
      <path d="M26 8C26 8 14 22 14 30a12 12 0 0 0 24 0C38 22 26 8 26 8Z" fill="white" opacity="0.95"/>
      <!-- Small drops -->
      <ellipse cx="12" cy="36" rx="4" ry="5.5" fill="white" opacity="0.5" transform="rotate(-10 12 36)"/>
      <ellipse cx="40" cy="36" rx="4" ry="5.5" fill="white" opacity="0.5" transform="rotate(10 40 36)"/>
    </svg>
  </div>
  <p class="splash-title">Rainfall Monitoring</p>
  <p class="splash-subtitle">TNCF Temanggung</p>
  <div class="splash-loader"></div>
</div>

<!-- Offline Notice -->
<div id="offline-notice">⚠️ Kamu sedang offline — data tidak bisa diperbarui</div>

<!-- Main App: Google Apps Script dalam iframe -->
<iframe
  id="app-frame"
  src="GANTI_DENGAN_URL_GAS_KAMU"
  allow="fullscreen"
  title="Rainfall Monitoring System"
></iframe>

<!-- Install Banner (Android / Desktop) -->
<div id="install-banner">
  <div class="install-icon">
    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M12 4C12 4 6 11 6 15a6 6 0 0 0 12 0C18 11 12 4 12 4Z" fill="white" opacity="0.9"/>
    </svg>
  </div>
  <div class="install-text">
    <strong>Install Rainfall Monitor</strong>
    <span>Akses cepat seperti aplikasi native</span>
  </div>
  <button class="install-btn" id="install-btn">Install</button>
  <button class="install-dismiss" id="install-dismiss" title="Tutup">✕</button>
</div>

<!-- iOS Install Hint -->
<div id="ios-hint">
  <button id="ios-hint-close">✕</button>
  <p>
    Untuk install di iPhone / iPad:<br>
    Ketuk <strong>ikon Share</strong> (kotak ↑) di browser,<br>
    lalu pilih <strong>"Add to Home Screen"</strong>
  </p>
</div>

<script>
  // ============================================================
  // CONFIG — GANTI URL DI SINI
  // ============================================================
  const GAS_URL = 'https://script.google.com/macros/s/AKfycbzTogHzh5nx7OD_MDcNCiQpqtNwVDXWPxTh-v6apKj3/dev';
  // Contoh: 'https://script.google.com/macros/s/AKfycbxxx.../exec'
  // ============================================================

  const frame   = document.getElementById('app-frame');
  const splash  = document.getElementById('splash');
  const offlineNotice = document.getElementById('offline-notice');

  // Set iframe src dari config
  if (GAS_URL !== 'https://script.google.com/macros/s/AKfycbzTogHzh5nx7OD_MDcNCiQpqtNwVDXWPxTh-v6apKj3/dev') {
    frame.src = GAS_URL;
  }

  // ---- Splash: hilangkan setelah iframe siap atau max 4 detik ----
  let splashGone = false;
  function hideSplash() {
    if (splashGone) return;
    splashGone = true;
    splash.classList.add('hidden');
  }
  frame.addEventListener('load', () => setTimeout(hideSplash, 300));
  setTimeout(hideSplash, 4000); // fallback

  // ---- Register Service Worker ----
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js')
        .then(reg => console.log('SW registered:', reg.scope))
        .catch(err => console.error('SW error:', err));
    });
  }

  // ---- Install Prompt (Android/Desktop/Chrome) ----
  let deferredPrompt = null;
  const installBanner  = document.getElementById('install-banner');
  const installBtn     = document.getElementById('install-btn');
  const installDismiss = document.getElementById('install-dismiss');

  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    deferredPrompt = e;
    // Tampilkan banner setelah 3 detik supaya tidak terlalu mengganggu
    setTimeout(() => installBanner.classList.add('show'), 3000);
  });

  installBtn.addEventListener('click', async () => {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    deferredPrompt = null;
    installBanner.classList.remove('show');
    console.log('Install outcome:', outcome);
  });

  installDismiss.addEventListener('click', () => {
    installBanner.classList.remove('show');
  });

  // Sembunyikan banner setelah berhasil diinstall
  window.addEventListener('appinstalled', () => {
    installBanner.classList.remove('show');
    console.log('PWA installed!');
  });

  // ---- iOS Install Hint ----
  const iosHint      = document.getElementById('ios-hint');
  const iosHintClose = document.getElementById('ios-hint-close');
  const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
  const isInStandaloneMode = window.matchMedia('(display-mode: standalone)').matches
                          || window.navigator.standalone;

  if (isIOS && !isInStandaloneMode) {
    // Tampilkan hint iOS setelah 4 detik
    setTimeout(() => iosHint.classList.add('show'), 4000);
  }
  iosHintClose.addEventListener('click', () => iosHint.classList.remove('show'));

  // ---- Offline Detection ----
  function updateOnlineStatus() {
    if (!navigator.onLine) {
      offlineNotice.classList.add('show');
    } else {
      offlineNotice.classList.remove('show');
    }
  }
  window.addEventListener('online',  updateOnlineStatus);
  window.addEventListener('offline', updateOnlineStatus);
  updateOnlineStatus();
</script>
</body>
</html>
